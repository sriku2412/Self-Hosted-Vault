services:
  app:
    build: .
    image: selfhosted-vault:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      BACKUP_DIR: /backups
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - vault-data:/data
      - ./backups:/backups
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/config', timeout=2)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  vault-data:

